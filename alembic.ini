[alembic]
script_location = baloo/db/migrations
sqlalchemy.url = postgresql+asyncpg://baloo:baloo@localhost:5432/baloo

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# Kept in sync with baloo.logging_config.LOG_FORMAT / LOG_DATEFMT so Alembic
# output (CLI and in-app migrations) matches the rest of the application.
format = %(asctime)s %(levelname)-5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S UTC
