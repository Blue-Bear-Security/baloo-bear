name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Sync root files to docs/
        run: |
          # Copy and fix links for MkDocs context (docs/ is the root)
          sed -e 's|docs/README.md|docs/getting-started.md|g' -e 's|docs/||g' -e 's|(README.md)|(./)|g' -e 's|(CONTRIBUTING.md)|(contributing.md)|g' -e 's|(AGENTS.md)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/AGENTS.md)|g' -e 's|(SECURITY.md)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/SECURITY.md)|g' -e 's|(LICENSE)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/LICENSE)|g' -e 's|(DOCKER.md)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/DOCKER.md)|g' -e 's|(\.env.example)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/.env.example)|g' -e 's|(scripts/local_review.py)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/scripts/local_review.py)|g' README.md > docs/index.md
          sed -e 's|(SECURITY.md)|(https://github.com/Blue-Bear-Security/baloo-bear/blob/main/SECURITY.md)|g' CONTRIBUTING.md > docs/contributing.md

      - name: Build docs
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
