{% extends "base.html" %}
{% set active_page = "reviews" %}

{% block title %}Reviews - Baloo Dashboard{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Reviews</h1>

  <!-- Filters -->
  <form class="flex space-x-3" hx-get="/dashboard/reviews" hx-target="#reviews-table" hx-swap="innerHTML" hx-push-url="true">
    <div class="relative">
      <input type="text" name="search" value="{{ search or '' }}" placeholder="Search PR title or author..."
             class="border rounded px-3 py-1.5 text-sm w-64 pr-10 focus:ring-indigo-500 focus:border-indigo-500">
      {% if search %}
      <a href="/dashboard/reviews?repo={{ repo or '' }}&status={{ status or '' }}"
         class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
        &times;
      </a>
      {% endif %}
    </div>
    <select name="status" class="border rounded px-3 py-1.5 text-sm">
      <option value="">All statuses</option>
      {% for s in ["approved", "changes_requested", "commented", "error", "agent_error", "in_progress"] %}
      <option value="{{ s }}" {% if status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
    <select name="repo" class="border rounded px-3 py-1.5 text-sm">
      <option value="">All repos</option>
      {% for rp in repos %}
      <option value="{{ rp }}" {% if repo == rp %}selected{% endif %}>{{ rp }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="bg-indigo-600 text-white px-4 py-1.5 rounded text-sm hover:bg-indigo-700">Filter</button>
  </form>
</div>

<div id="reviews-table" class="bg-white rounded-lg shadow overflow-hidden">
  {% include "partials/reviews_table.html" %}
</div>
{% endblock %}
