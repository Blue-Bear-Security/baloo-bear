<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Baloo Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/dashboard-static/dashboard.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-14">
        <div class="flex space-x-8">
          <a href="/dashboard/" class="flex items-center text-lg font-semibold text-gray-900">Baloo</a>
          <a href="/dashboard/"
             class="inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium
                    {% if active_page == 'overview' %}border-indigo-500 text-gray-900{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
            Overview
          </a>
          <a href="/dashboard/reviews"
             class="inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium
                    {% if active_page == 'reviews' %}border-indigo-500 text-gray-900{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
            Reviews
          </a>
          <a href="/dashboard/analytics"
             class="inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium
                    {% if active_page == 'analytics' %}border-indigo-500 text-gray-900{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
            Analytics
          </a>
          <a href="/dashboard/outcomes"
             class="inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium
                    {% if active_page == 'outcomes' %}border-indigo-500 text-gray-900{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
            Outcomes
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>
  <script>
    function convertTimestamps(root) {
      root.querySelectorAll("time.local-time").forEach(function(el) {
        var d = new Date(el.getAttribute("datetime"));
        if (!isNaN(d)) {
          el.textContent = d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0") + " " +
            String(d.getHours()).padStart(2, "0") + ":" +
            String(d.getMinutes()).padStart(2, "0");
        }
      });
      root.querySelectorAll("time.local-time-short").forEach(function(el) {
        var d = new Date(el.getAttribute("datetime"));
        if (!isNaN(d)) {
          el.textContent = String(d.getHours()).padStart(2, "0") + ":" +
            String(d.getMinutes()).padStart(2, "0") + ":" +
            String(d.getSeconds()).padStart(2, "0");
        }
      });
    }
    convertTimestamps(document);
    document.body.addEventListener("htmx:afterSwap", function(e) {
      convertTimestamps(e.detail.target);
    });
  </script>
</body>
</html>
