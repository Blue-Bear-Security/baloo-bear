services:
  db:
    image: postgres:18-alpine
    container_name: baloo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baloo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-baloo}
    volumes:
      - baloo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baloo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  baloo:
    build:
      context: .
      dockerfile: Dockerfile
    image: baloo:local
    container_name: baloo-agent
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${BALOO_ENV_FILE:-.env}
    volumes:
      - ./.secrets:/app/.secrets:ro
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CONCURRENT_REVIEWS: ${MAX_CONCURRENT_REVIEWS:-3}
      REVIEW_STALE_TIMEOUT_MINUTES: ${REVIEW_STALE_TIMEOUT_MINUTES:-30}
      AGENT_MODEL: ${AGENT_MODEL:-claude-sonnet-4-6}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
      AGENT_TEMPERATURE: ${AGENT_TEMPERATURE:-0.2}
      REVIEW_AUTO_APPROVE: ${REVIEW_AUTO_APPROVE:-false}
      REVIEW_MIN_SEVERITY: ${REVIEW_MIN_SEVERITY:-MEDIUM}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-baloo}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-baloo}}
      INSTALLATION_ID: ${INSTALLATION_ID:-}
      DASHBOARD_ENABLED: ${DASHBOARD_ENABLED:-false}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  baloo_pgdata:
